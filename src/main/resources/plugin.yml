name: ${pluginName}
main: com.mrfdev.boosters.Boosters
version: ${version}
api-version: '${pluginYamlApiVersion}'
author: mrfloris
website: https://github.com/mrfdev/Boosters
description: Track and restore mcMMO/Jobs boosters, plus detect PyroWelcomesPro point boosts, with the /rate command.

softdepend:
  - mcMMO
  - Jobs
  - PyroWelcomesPro
  - PlaceholderAPI

commands:
  rate:
    description: Show booster status, view plugin info, or manage tracked boosters.
    usage: /rate [info|start|stop|reload|debug] ...

permissions:
  onemb.boosters.rate:
    description: Allows players to view booster status with /rate.
    default: true
  onemb.boosters.admin:
    description: Allows staff to start and stop tracked boosters with /rate.
    default: op
  onemb.boosters.debug:
    description: Allows staff to use /rate debug for build and state diagnostics.
    default: op
