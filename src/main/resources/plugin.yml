name: ${pluginName}
main: com.mrfdev.boosters.Boosters
version: ${version}
api-version: '1.21'
author: mrfloris
website: https://github.com/mrfdev/Boosters
description: Track, restore, and schedule mcMMO and Jobs boosters with the /rate command.

softdepend:
  - mcMMO
  - Jobs
  - PlaceholderAPI

commands:
  rate:
    description: Show, start, or stop tracked mcMMO and Jobs boosters.
    usage: /rate [start|stop|debug] ...

permissions:
  onemb.boosters.rate:
    description: Allows players to view booster status with /rate.
    default: true
  onemb.boosters.admin:
    description: Allows staff to start and stop tracked boosters with /rate.
    default: op
  onemb.boosters.debug:
    description: Allows staff to use /rate debug for build and state diagnostics.
    default: op
